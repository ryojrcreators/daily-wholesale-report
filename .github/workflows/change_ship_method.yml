name: Shipment Ship Method変更（Yamato Nekopos）

on:
  workflow_dispatch:
    inputs:
      shipment_id:
        description: '対象のShipment ID（Package id）'
        required: true

jobs:
  change:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium || sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1

      - name: Ship Method変更
        env:
          LOGIN_ID_1: ${{ secrets.LOGIN_ID_1 }}
          LOGIN_PASS_1: ${{ secrets.LOGIN_PASS_1 }}
          LOGIN_ID_2: ${{ secrets.LOGIN_ID_2 }}
          LOGIN_PASS_2: ${{ secrets.LOGIN_PASS_2 }}
          CW_TOKEN: ${{ secrets.CW_TOKEN }}
          SHIPMENT_ID: ${{ github.event.inputs.shipment_id }}
        run: python -u change_ship_method.py

      - name: デバッグ用スクリーンショット保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: "*.png"
          if-no-files-found: ignore
