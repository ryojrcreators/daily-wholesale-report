name: ショッピングレポート処理（Close / 数量変更）

on:
  workflow_dispatch:
    inputs:
      sheet_name:
        description: '【旧形式レポート用】PO#(D1)を読むタブ名（PO#付きレポートでは不要）'
        required: false
        default: ''
      dry_run:
        description: 'ドライラン（true=下見のみ / false=実際に変更）'
        required: false
        default: 'true'
  schedule:
    # LA 18:00 に自動実行（本番）。UTC固定のため夏時間・冬時間の両方を登録し、
    # 二重実行防止（_state）により実際に処理されるのは1回だけ。
    - cron: '0 1 * * *'   # PDT(夏) 18:00
    - cron: '0 2 * * *'   # PST(冬) 18:00

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium || sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1

      - name: ショッピングレポート処理
        env:
          LOGIN_ID_1: ${{ secrets.LOGIN_ID_1 }}
          LOGIN_PASS_1: ${{ secrets.LOGIN_PASS_1 }}
          LOGIN_ID_2: ${{ secrets.LOGIN_ID_2 }}
          LOGIN_PASS_2: ${{ secrets.LOGIN_PASS_2 }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          CW_TOKEN: ${{ secrets.CW_TOKEN }}
          SHEET_NAME: ${{ github.event.inputs.sheet_name }}
          # 手動実行は入力値（既定 true=ドライラン）。スケジュール実行は入力が無いので false（本番）。
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python -u shopping_report_process.py

