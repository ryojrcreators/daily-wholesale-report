name: Report Delay 自動処理

on:
  workflow_dispatch:
    inputs:
      subject_prefix:
        description: '件名の先頭に付ける文字（訂正再送用。通常は空欄）'
        required: false
        default: ''
      body_prefix:
        description: '本文の先頭に付ける文（訂正のお詫び文など。通常は空欄）'
        required: false
        default: ''
  schedule:
    - cron: '0 16 * * *'   # 毎日UTC 16:00 = PDT 9:00
    - cron: '0 0 * * *'    # 毎日UTC 0:00  = PDT 17:00

jobs:
  report_delay:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium || sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1

      - name: Report Delay 自動処理
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          LOGIN_ID_1:   ${{ secrets.LOGIN_ID_1 }}
          LOGIN_PASS_1: ${{ secrets.LOGIN_PASS_1 }}
          LOGIN_ID_2:   ${{ secrets.LOGIN_ID_2 }}
          LOGIN_PASS_2: ${{ secrets.LOGIN_PASS_2 }}
          SUBJECT_PREFIX: ${{ inputs.subject_prefix }}
          BODY_PREFIX: ${{ inputs.body_prefix }}
        run: python report_delay.py
