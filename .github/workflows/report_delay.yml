name: Report Delay 自動処理

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'   # 毎日UTC 16:00 = PDT 9:00
    - cron: '0 0 * * *'    # 毎日UTC 0:00  = PDT 17:00

jobs:
  report_delay:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium || sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libxshmfence1

      - name: Report Delay 自動処理
        env:
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          LOGIN_ID_1:   ${{ secrets.LOGIN_ID_1 }}
          LOGIN_PASS_1: ${{ secrets.LOGIN_PASS_1 }}
          LOGIN_ID_2:   ${{ secrets.LOGIN_ID_2 }}
          LOGIN_PASS_2: ${{ secrets.LOGIN_PASS_2 }}
        run: python report_delay.py
